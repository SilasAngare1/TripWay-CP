 <main>

    <h1>Contato</h1>
        <section>
            <h2>Formulario de Contato</h2>

            <form>
                  
                <label for="Nome">Nome:</label>
                <input type="text" id="Nome" placeholder="Ex: Silas Oliveira "
                step="any" required>
                <br>
                
                <label for="Email">Email:</label>
                <input type="text" id="Email" placeholder="Ex: silas@outlook.com"
                step="any" required>
                <br>
                
                <label for="Destino de interesse">Destino de interesse:</label>
                <input type="text" id="Destino de interesse" placeholder="Ex: Praia"
                step="any" required>
                  <br>
                <label for="Data">Data:</label>
                <input type="number" id="Data" placeholder="Ex: 10/12/2026" required
                step="any" required>
                  <br>
                

                <label for="Quantidade de pessoas">Quantidade de pessoas:</label>
                <input type="number" id="Quantidade de pessoas" placeholder="Ex: 4" required>
                <br>

                <label for="Mensagem">Mensagem:</label>
                <input type="text" id="Mensagem" placeholder="Ex: Mensagem "
                step="any" required>
                <br>

                <button type="submit">Enviar</button>
            </form>


            
        </section>

        <a href="../index.html">Voltar</a>
    </main>
  

</body>
</html>
